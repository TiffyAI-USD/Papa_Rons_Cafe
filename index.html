<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAPA RON'S POS - COFFEE BAY - FULL SYSTEM</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* Banner Logic - Matching Website Proportions */
        .banner-wrap { width: 100%; display: flex; justify-content: center; margin-bottom: 15px; }
        #main-banner { width: 100%; max-width: 900px; height: auto; border-bottom: 3px solid #d4a373; }

        h1 { text-align: center; color: #d4a373; font-size: 2.5rem; margin: 10px 0; text-transform: uppercase; }
        
        /* Navigation Controls */
        #login, #pos, #stockIn, #inventoryView, #transactionsView { display: none; }
        .active-view { display: block !important; }

        .top-nav { display: flex; gap: 10px; margin-bottom: 15px; }
        .nav-btn { flex: 1; padding: 15px; font-size: 1.2rem; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; text-transform: uppercase; }
        .btn-logout { background: #c62828; color: white; }
        .btn-stock { background: #455a64; color: white; }
        .btn-history { background: #455a64; color: white; }

        /* Grid System for Products */
        .pos-container { display: flex; gap: 15px; height: 55vh; margin-bottom: 15px; }
        .grid-column { flex: 1; display: flex; flex-direction: column; }
        .grid-header { text-align: center; color: #d4a373; font-weight: bold; font-size: 1.3rem; margin-bottom: 8px; padding: 5px; background: #1a1a1a; border-radius: 5px; }
        
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            overflow-y: auto; 
            background: #080808; 
            padding: 10px; 
            border: 1px solid #333; 
            border-radius: 15px;
            flex-grow: 1;
        }

        /* Product Buttons Style */
        .p-btn { 
            min-height: 90px; 
            color: white; 
            border-radius: 10px; 
            border: none; 
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 0.85rem; 
            cursor: pointer; 
            transition: 0.2s; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            padding: 10px;
        }
        .food-item { background: #5d4037; border-bottom: 5px solid #3e2723; }
        .drink-item { background: #1565c0; border-bottom: 5px solid #0d47a1; }
        .p-btn:active { transform: translateY(4px); border-bottom-width: 1px; }

        /* Checkout & Cart Area */
        .cart-section { background: #111; border: 2px solid #222; border-radius: 15px; padding: 20px; }
        #total-amount { font-size: 3.5rem; text-align: center; color: #44ff44; font-weight: bold; margin: 10px 0; font-family: 'Courier New', Courier, monospace; }
        .pay-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-pay { height: 80px; font-size: 1.8rem; font-weight: bold; color: white; border-radius: 12px; border: none; cursor: pointer; }
        .btn-cash { background: #43a047; }
        .btn-card { background: #1e88e5; }
        
        #order-list { list-style: none; padding: 0; margin-top: 15px; max-height: 200px; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; font-size: 1.2rem; }
        .remove-btn { background: #ff5252; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.9rem; }

        /* Multiplier & Modal Popups */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); display: none; z-index: 2000; 
        }
        .modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #1a1a1a; padding: 30px; border: 3px solid #d4a373; 
            width: 90%; max-width: 480px; z-index: 2001; border-radius: 25px;
            display: none;
        }
        input[type="number"], input[type="password"], input[type="text"] { 
            width: 100%; padding: 18px; font-size: 1.6rem; margin: 10px 0; 
            background: #000; color: #fff; border: 1px solid #444; border-radius: 12px; 
            box-sizing: border-box; text-align: center;
        }
    </style>
</head>
<body>

    <div class="banner-wrap">
        <img id="main-banner" src="https://tiffyai-usd.github.io/Papa_Ron_Point_of_Sale/banner.png" alt="PAPA RON'S">
    </div>

    <div id="login" class="active-view">
        <h1>PAPA RON'S LOGIN</h1>
        <div style="max-width: 400px; margin: 0 auto;">
            <input type="password" id="staff-pin" placeholder="ENTER PIN" autofocus />
            <button class="nav-btn" onclick="authenticate('sale')" style="background:#d4a373; color:black; width:100%; margin-top:10px;">SALE MODE</button>
            <button class="nav-btn" onclick="authenticate('stock')" style="background:#2e7d32; color:white; width:100%; margin-top:15px;">REPLENISH STOCK</button>
        </div>
    </div>

    <div id="pos">
        <div class="top-nav">
            <button class="nav-btn btn-logout" onclick="location.reload()">LOGOUT</button>
            <button class="nav-btn btn-stock" onclick="showInventoryView()">VIEW STOCK</button>
            <button class="nav-btn btn-history" onclick="showHistory()">HISTORY</button>
        </div>

        <div class="pos-container">
            <div class="grid-column">
                <div class="grid-header">FOOD MENU</div>
                <div id="saleFoodGrid" class="product-grid"></div>
            </div>
            <div class="grid-column">
                <div class="grid-header">DRINK MENU</div>
                <div id="saleDrinkGrid" class="product-grid"></div>
            </div>
        </div>

        <div class="cart-section">
            <div id="total-amount">R0.00</div>
            <div class="pay-row">
                <button class="btn-pay btn-cash" onclick="processPayment('CASH')">CASH</button>
                <button class="btn-pay btn-card" onclick="processPayment('CARD')">CARD</button>
            </div>
            <ul id="order-list"></ul>
            <input type="text" id="manual-barcode" placeholder="OR SCAN BARCODE..." style="margin-top:15px; font-size:1.1rem; padding:10px;">
        </div>
    </div>

    <div id="stockIn">
        <h1>REPLENISH STOCK</h1>
        <button class="nav-btn" onclick="location.reload()" style="background:#333; color:white; margin-bottom:15px;">BACK TO LOGIN</button>
        
        <div class="pos-container">
            <div class="grid-column">
                <div class="grid-header">ADD FOOD STOCK</div>
                <div id="stockFoodGrid" class="product-grid"></div>
            </div>
            <div class="grid-column">
                <div class="grid-header">ADD DRINK STOCK</div>
                <div id="stockDrinkGrid" class="product-grid"></div>
            </div>
        </div>
        <div id="replenish-status" style="text-align:center; font-size:1.5rem; color:#44ff44; font-weight:bold; margin-top:15px;"></div>
    </div>

    <div id="modal-overlay" class="overlay"></div>
    <div id="multiplierModal" class="modal">
        <h2 id="modal-item-name" style="text-align:center; color:#d4a373;"></h2>
        <div style="display:flex; gap:10px;">
            <div style="flex:1;">
                <label>Packs (x6)</label>
                <input type="number" id="p-qty" value="0">
            </div>
            <div style="flex:1;">
                <label>Cases (x24)</label>
                <input type="number" id="c-qty" value="0">
            </div>
        </div>
        <label>Single Units</label>
        <input type="number" id="s-qty" placeholder="0">
        <button onclick="saveNewStock()" style="background:#44ff44; color:black; width:100%; padding:20px; font-size:1.5rem; font-weight:bold; border-radius:15px; margin-top:10px;">UPDATE STOCK</button>
        <button onclick="closePopups()" style="background:#333; color:white; width:100%; padding:10px; margin-top:10px; border-radius:10px;">CANCEL</button>
    </div>

    <audio id="snd-click" src="https://tiffyai-usd.github.io/Papa_Ron_Point_of_Sale/click.wav" preload="auto"></audio>
    <audio id="snd-sell" src="https://tiffyai-usd.github.io/Papa_Ron_Point_of_Sale/eat.wav" preload="auto"></audio>
    <audio id="snd-stock" src="https://tiffyai-usd.github.io/Papa_Ron_Point_of_Sale/sparcle.wav" preload="auto"></audio>

    <script>
        // THE FULL INVENTORY OBJECT
        const inventory = JSON.parse(localStorage.getItem('posInventory')) || {
            "1001": { name: "SOMETHING MEATY PIZZA", price: 135, stock: 0, cat: "food" },
            "1002": { name: "HAWAIIAN PIZZA", price: 135, stock: 0, cat: "food" },
            "1003": { name: "FLAMING SPARE RIB PIZZA", price: 150, stock: 0, cat: "food" },
            "1004": { name: "CHEESE BURGER", price: 120, stock: 0, cat: "food" },
            "1005": { name: "CHEESY STRIPS (5)", price: 50, stock: 0, cat: "food" },
            "1006": { name: "BOERIE ROLL", price: 50, stock: 0, cat: "food" },
            "1007": { name: "RUMP STEAK", price: 160, stock: 0, cat: "food" },
            "1008": { name: "RIB RACK", price: 200, stock: 0, cat: "food" },
            "1009": { name: "SCHNITZEL", price: 120, stock: 0, cat: "food" },
            "1010": { name: "PREGO ROLL", price: 50, stock: 0, cat: "food" },
            "1011": { name: "MUNCHIE PLATTER", price: 350, stock: 0, cat: "food" },
            "1012": { name: "CHEESY POPS", price: 50, stock: 0, cat: "food" },
            "1013": { name: "CHICKEN PERI NACHO", price: 160, stock: 0, cat: "food" },
            "1014": { name: "WINGLETS 5", price: 60, stock: 0, cat: "food" },
            "1015": { name: "WINGLETS 10", price: 100, stock: 0, cat: "food" },
            "1016": { name: "PLATTER FOR 2", price: 350, stock: 0, cat: "food" },
            "1017": { name: "BREAKFAST", price: 80, stock: 0, cat: "food" },
            "1018": { name: "SIDE CHIPS", price: 20, stock: 0, cat: "food" },
            "1019": { name: "SIDE SALAD", price: 20, stock: 0, cat: "food" },
            "1020": { name: "GREEK SALAD", price: 20, stock: 0, cat: "food" },
            "5449000000453": { name: "COKE 500ML", price: 20, stock: 0, cat: "drink" },
            "5449000050809": { name: "FANTA 500ML", price: 20, stock: 0, cat: "drink" },
            "5449000332967": { name: "SPRITE 500ML", price: 20, stock: 0, cat: "drink" },
            "2004": { name: "POWERADE 500ML", price: 15, stock: 0, cat: "drink" },
            "6001240239490": { name: "LIQUIFRUIT 300ML", price: 15, stock: 0, cat: "drink" },
            "6001048003323": { name: "APPLETIZER 275ML", price: 20, stock: 0, cat: "drink" },
            "2007": { name: "MR ORANGE 300ML", price: 10, stock: 0, cat: "drink" },
            "5449000332981": { name: "STONEY 500ML", price: 20, stock: 0, cat: "drink" },
            "5449000096111": { name: "TONIC WATER 200ML", price: 20, stock: 0, cat: "drink" },
            "5449000284280": { name: "DRY LEMON 200ML", price: 20, stock: 0, cat: "drink" },
            "2011": { name: "MINERAL WATER 500ML", price: 10, stock: 0, cat: "drink" },
            "6001324217253": { name: "ENERGADE 500ML", price: 20, stock: 0, cat: "drink" },
            "2012": { name: "SPARKLING WATER 500ML", price: 15, stock: 0, cat: "drink" },
            "6009604170014": { name: "STILL WATER 500ML", price: 10, stock: 0, cat: "drink" },
            "2013": { name: "MINERAL WATER 1L", price: 15, stock: 0, cat: "drink" },
            "6003326012041": { name: "BLACK LABEL 500ML", price: 30, stock: 0, cat: "drink" },
            "6003326015790": { name: "BLACK LABEL 330ML", price: 30, stock: 0, cat: "drink" },
            "6003326015820": { name: "CASTLE LAGER 330ML", price: 30, stock: 0, cat: "drink" },
            "6003326015721": { name: "CASTLE LIGHT 330ML", price: 30, stock: 0, cat: "drink" },
            "6001760007715": { name: "WINDHOEK 500ML", price: 30, stock: 0, cat: "drink" },
            "6001108064264": { name: "HUNTERS DRY 440ML", price: 35, stock: 0, cat: "drink" },
            "6001108055231": { name: "HUNTERS GOLD 330ML", price: 35, stock: 0, cat: "drink" },
            "6001398128400": { name: "SMIRNOFF ICE 440ML", price: 35, stock: 0, cat: "drink" },
            "6003326013949": { name: "BRUTAL FRUIT 275ML", price: 35, stock: 0, cat: "drink" },
            "5010677554398": { name: "BREEZER WATERMELON", price: 35, stock: 0, cat: "drink" },
            "6003326013918": { name: "FLYING FISH 500ML", price: 35, stock: 0, cat: "drink" },
            "6001108028044": { name: "SAVANNA 330ML", price: 35, stock: 0, cat: "drink" },
            "5410228141266": { name: "STELLA ARTOIS 330ML", price: 35, stock: 0, cat: "drink" },
            "6003326015691": { name: "BLACK CROWN 440ML", price: 35, stock: 0, cat: "drink" },
            "5000289938297": { name: "GORDONS PINK 440ML", price: 35, stock: 0, cat: "drink" },
            "5000289938280": { name: "GORDONS GIN 440ML", price: 35, stock: 0, cat: "drink" },
            "6001108097217": { name: "EXTREME 275ML", price: 35, stock: 0, cat: "drink" },
            "2211": { name: "SODAZE 250ML", price: 60, stock: 0, cat: "drink" },
            "6001108112064": { name: "BERNINI 500ML", price: 35, stock: 0, cat: "drink" },
            "9002490100070": { name: "RED BULL 250ML", price: 25, stock: 0, cat: "drink" },
            "2210": { name: "LUCKY CLUB 250ML", price: 70, stock: 0, cat: "drink" }
        };

        let cart = [];
        let currentStockItem = "";

        // AUTHENTICATION
        function authenticate(mode) {
            const pin = document.getElementById('staff-pin').value;
            if(pin === "1234") {
                document.getElementById('login').classList.remove('active-view');
                if(mode === 'sale') {
                    document.getElementById('pos').classList.add('active-view');
                    initGrids('sale');
                } else {
                    document.getElementById('stockIn').classList.add('active-view');
                    initGrids('stock');
                }
            } else { alert("ACCESS DENIED"); }
        }

        // GRID INITIALIZATION (FOR BOTH MODES)
        function initGrids(mode) {
            const foodGridId = mode === 'sale' ? 'saleFoodGrid' : 'stockFoodGrid';
            const drinkGridId = mode === 'sale' ? 'saleDrinkGrid' : 'stockDrinkGrid';
            
            const fGrid = document.getElementById(foodGridId);
            const dGrid = document.getElementById(drinkGridId);
            
            fGrid.innerHTML = "";
            dGrid.innerHTML = "";

            Object.keys(inventory).forEach(code => {
                const item = inventory[code];
                const btn = document.createElement('button');
                btn.className = `p-btn ${item.cat === 'food' ? 'food-item' : 'drink-item'}`;
                btn.textContent = item.name;

                if(mode === 'sale') {
                    btn.onclick = () => { playSound('snd-click'); addToCart(code); };
                } else {
                    btn.onclick = () => { playSound('snd-click'); triggerMultiplier(code); };
                }

                if(item.cat === 'food') fGrid.appendChild(btn);
                else dGrid.appendChild(btn);
            });
        }

        // CART LOGIC
        function addToCart(code) {
            const item = inventory[code];
            if(item.cat === 'drink' && item.stock <= 0) return alert("ITEM OUT OF STOCK");
            
            cart.push({...item, barcode: code});
            if(item.cat === 'drink') item.stock--;
            playSound('snd-sell');
            refreshCartDisplay();
        }

        function refreshCartDisplay() {
            const list = document.getElementById('order-list');
            list.innerHTML = "";
            let total = 0;
            
            cart.forEach((it, idx) => {
                total += it.price;
                const li = document.createElement('li');
                li.className = 'cart-item';
                li.innerHTML = `<span>${it.name}</span> <span>R${it.price.toFixed(2)} <button class="remove-btn" onclick="voidCartItem(${idx})">X</button></span>`;
                list.appendChild(li);
            });
            
            document.getElementById('total-amount').textContent = "R" + total.toFixed(2);
            localStorage.setItem('posInventory', JSON.stringify(inventory));
        }

        function voidCartItem(index) {
            const item = cart[index];
            if(inventory[item.barcode].cat === 'drink') inventory[item.barcode].stock++;
            cart.splice(index, 1);
            refreshCartDisplay();
        }

        // STOCK REPLENISHMENT
        function triggerMultiplier(code) {
            currentStockItem = code;
            document.getElementById('modal-item-name').textContent = inventory[code].name;
            document.getElementById('p-qty').value = 0;
            document.getElementById('c-qty').value = 0;
            document.getElementById('s-qty').value = "";
            
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('multiplierModal').style.display = 'block';
        }

        function saveNewStock() {
            const p = parseInt(document.getElementById('p-qty').value) || 0;
            const c = parseInt(document.getElementById('c-qty').value) || 0;
            const s = parseInt(document.getElementById('s-qty').value) || 0;
            
            let addedTotal = (p * 6) + (c * 24) + s;
            if(addedTotal === 0) addedTotal = 1;

            inventory[currentStockItem].stock += addedTotal;
            playSound('snd-stock');
            
            document.getElementById('replenish-status').textContent = `ADDED ${addedTotal} TO ${inventory[currentStockItem].name}`;
            localStorage.setItem('posInventory', JSON.stringify(inventory));
            closePopups();
            
            setTimeout(() => { document.getElementById('replenish-status').textContent = ""; }, 3000);
        }

        function closePopups() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('multiplierModal').style.display = 'none';
        }

        function processPayment(method) {
            if(cart.length === 0) return;
            const total = document.getElementById('total-amount').textContent;
            alert(`SALE FINALIZED: ${total} via ${method}`);
            cart = [];
            refreshCartDisplay();
        }

        function playSound(id) { document.getElementById(id).play().catch(()=>{}); }

        // BARCODE SCANNER EMULATION
        document.getElementById('manual-barcode').addEventListener('keyup', (e) => {
            if(e.key === "Enter") {
                const code = e.target.value.trim();
                if(inventory[code]) addToCart(code);
                else alert("BARCODE NOT FOUND");
                e.target.value = "";
            }
        });
    </script>
</body>
</html>
