<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAPA RON'S COFFEE BAY POS</title>
    <style>
        body { font-family: Arial, sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; }
        h1 { text-align: center; color: #d4a373; font-size: 2.5rem; margin: 20px 0; }
        input, button { font-size: 1.8rem; padding: 15px; margin: 10px 0; width: 100%; border-radius: 10px; box-sizing: border-box; }
        button { background: #d4a373; color: #000; border: none; cursor: pointer; font-weight: bold; }
        #items { list-style: none; padding: 0; max-height: 35vh; overflow-y: auto; }
        li { background: #111; padding: 15px; margin: 10px 0; border-radius: 10px; font-size: 1.6rem; display: flex; justify-content: space-between; }
        #total { font-size: 2.5rem; text-align: center; margin: 20px 0; color: #d4a373; }
        #login, #stockIn, #inventoryView, #transactionsView { text-align: center; margin-top: 50px; }
        #pos, #inventoryView, #multiplierPopup, #tenderPopup, #stockIn, #transactionsView { display: none; }
        .stock-info { font-size: 1.4rem; color: #aaa; margin: 15px 0; text-align: center; }
        #inventoryList { list-style: none; padding: 0; max-height: 70vh; overflow-y: auto; }
        #inventoryList li { background: #111; padding: 12px; margin: 8px 0; border-radius: 8px; font-size: 1.4rem; }
        
        .category-container { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 20px; }
        .category-section { width: 48%; }
        .category-title { text-align: center; color: #d4a373; margin-bottom: 8px; font-size: 1.6rem; }
        .category-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-height: 40vh; overflow-y: auto; padding-right: 5px; }
        .product-btn { font-size: 1.1rem; padding: 12px; color: white; border-radius: 8px; cursor: pointer; text-align: center; border: none; min-height: 60px; }
        .food-btn { background: #8b5a2b; }
        .drink-btn { background: #1e88e5; }

        #multiplierPopup, #tenderPopup { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #111; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; 
            z-index: 1000; box-shadow: 0 0 20px rgba(212,163,115,0.5); border: 1px solid #d4a373;
        }
    </style>
</head>
<body>

    <div id="login">
        <h1>LOGIN</h1>
        <input type="password" id="pin" placeholder="Enter PIN" autofocus />
        <button onclick="login()">SALE MODE</button>
        <button onclick="stockInMode()" style="background:#44ff44;">REPLENISH STOCK</button>
    </div>

    <div id="pos">
        <button onclick="logout()">LOGOUT</button>
        <button onclick="showInventory()">VIEW INVENTORY</button>
        <button onclick="showTransactions()">HISTORY</button>

        <div id="quickButtons">
            <div class="category-container">
                <div class="category-section">
                    <div class="category-title">Food</div>
                    <div id="foodGrid" class="category-grid"></div>
                </div>
                <div class="category-section">
                    <div class="category-title">Drinks</div>
                    <div id="drinkGrid" class="category-grid"></div>
                </div>
            </div>
        </div>

        <input type="text" id="barcode" placeholder="Scan or Type Barcode" />
        <div id="total">Total: R0.00</div>
        
        <button onclick="payCash()" style="background:#44ff44;">CASH</button>
        <button onclick="payCard()" style="background:#1e88e5; color:white;">CARD</button>
        <button onclick="printPreview()">KITCHEN/BAR TABS</button>
        <button onclick="clearCart()">CLEAR SALE</button>
        <button id="printReceiptBtn" onclick="printLastReceipt()" style="display:none; background:#ff9800;">PRINT RECEIPT</button>

        <h3>Order #<span id="currentTransNum">1</span> <span id="transStatus"></span></h3>
        <ul id="items"></ul>
        <div id="stockStatus" class="stock-info"></div>
    </div>

    <div id="stockIn">
        <h1>STOCK REPLENISH</h1>
        <button onclick="logout()">BACK</button>
        
        <div id="stockQuickButtons">
            <div class="category-container">
                <div class="category-section">
                    <div class="category-title">Food (Stock)</div>
                    <div id="stockFoodGrid" class="category-grid"></div>
                </div>
                <div class="category-section">
                    <div class="category-title">Drinks (Stock)</div>
                    <div id="stockDrinkGrid" class="category-grid"></div>
                </div>
            </div>
        </div>

        <input type="text" id="stockBarcode" placeholder="Scan Barcode to Add" />
        <div id="stockInStatus" class="stock-info"></div>
    </div>

    <div id="inventoryView">
        <h2>Inventory</h2>
        <button onclick="backToPOS()">BACK</button>
        <ul id="inventoryList"></ul>
    </div>

    <div id="transactionsView">
        <h2>Transactions</h2>
        <button onclick="backToPOS()">BACK</button>
        <div id="transList"></div>
    </div>

    <div id="multiplierPopup">
        <h2 id="popupItemName"></h2>
        <p>Enter Stock Quantity:</p>
        <input type="number" id="packsInput" placeholder="Packs (×6)" />
        <input type="number" id="casesInput" placeholder="Cases (×24)" />
        <button onclick="confirmMultiplier()">ADD STOCK</button>
        <button onclick="cancelMultiplier()">ADD 1 UNIT</button>
    </div>

    <div id="tenderPopup">
        <h2>Cash Payment</h2>
        <p>Total: R<span id="tenderTotal">0.00</span></p>
        <input type="number" id="tenderAmount" placeholder="Amount Received" step="0.01" />
        <div id="tenderResult" style="font-size:2rem; color:#44ff44;"></div>
        <button onclick="confirmTender()">FINALIZE</button>
        <button onclick="cancelTender()">CANCEL</button>
    </div>

    <audio id="clickSound" src="https://tiffyai-usd.github.io/Papa_Ron_Point_of_Sale/click.wav" preload="auto"></audio>
    <audio id="eatSound" src="https://tiffyai-usd.github.io/Papa_Ron_Point_of_Sale/eat.wav" preload="auto"></audio>
    <audio id="sparkleSound" src="https://tiffyai-usd.github.io/Papa_Ron_Point_of_Sale/sparcle.wav" preload="auto"></audio>

    <script>
        const STAFF = {"1234": "Staff 1", "5678": "Staff 2", "9012": "Staff 3", "3456": "Manager"};
        let inventory = JSON.parse(localStorage.getItem('posInventory')) || {
            "1001": { name: "SOMETHING MEATY PIZZA", price: 135, stock: 0, sold: 0, category: "food" },
            "1002": { name: "HAWAIIAN PIZZA", price: 135, stock: 0, sold: 0, category: "food" },
            "1003": { name: "FLAMING SPARE RIB PIZZA", price: 150, stock: 0, sold: 0, category: "food" },
            "1004": { name: "CHEESE BURGER", price: 120, stock: 0, sold: 0, category: "food" },
            "1005": { name: "CHEESY STRIPS (5)", price: 50, stock: 0, sold: 0, category: "food" },
            "1006": { name: "BOERIE ROLL", price: 50, stock: 0, sold: 0, category: "food" },
            "1007": { name: "RUMP STEAK", price: 160, stock: 0, sold: 0, category: "food" },
            "1008": { name: "RIB RACK", price: 200, stock: 0, sold: 0, category: "food" },
            "1009": { name: "SCHNITZEL", price: 120, stock: 0, sold: 0, category: "food" },
            "1010": { name: "PREGO ROLL", price: 50, stock: 0, sold: 0, category: "food" },
            "1011": { name: "MUNCHIE PLATTER", price: 350, stock: 0, sold: 0, category: "food" },
            "1012": { name: "CHEESY POPS", price: 50, stock: 0, sold: 0, category: "food" },
            "1013": { name: "CHICKEN PERI NACHO", price: 160, stock: 0, sold: 0, category: "food" },
            "1014": { name: "WINGLETS 5", price: 60, stock: 0, sold: 0, category: "food" },
            "1015": { name: "WINGLETS 10", price: 100, stock: 0, sold: 0, category: "food" },
            "1016": { name: "PLATTER FOR 2", price: 350, stock: 0, sold: 0, category: "food" },
            "1017": { name: "BREAKFAST", price: 80, stock: 0, sold: 0, category: "food" },
            "1018": { name: "SIDE CHIPS", price: 20, stock: 0, sold: 0, category: "food" },
            "1019": { name: "SIDE SALAD", price: 20, stock: 0, sold: 0, category: "food" },
            "1020": { name: "GREEK SALAD", price: 20, stock: 0, sold: 0, category: "food" },
            "5449000000453": { name: "Coke 500ml", price: 20, stock: 0, sold: 0, category: "drink" },
            "5449000050809": { name: "Fanta 500ml", price: 20, stock: 0, sold: 0, category: "drink" },
            "5449000332967": { name: "Sprite 500ml", price: 20, stock: 0, sold: 0, category: "drink" },
            "5449000332981": { name: "Stoney 500ml", price: 20, stock: 0, sold: 0, category: "drink" }
        };

        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        let currentTransIndex = -1;
        let cart = [];
        let pendingStockCode = "";
        let currentStaffName = "";
        let lastReceiptContent = "";
        let dailySales = JSON.parse(localStorage.getItem('dailySales')) || { date: new Date().toDateString(), cash: 0, card: 0 };

        function playClick() { document.getElementById("clickSound").play().catch(()=>{}); }
        function playEat() { document.getElementById("eatSound").play().catch(()=>{}); }
        function playSparkle() { document.getElementById("sparkleSound").play().catch(()=>{}); }

        function saveAll() {
            localStorage.setItem('posInventory', JSON.stringify(inventory));
            localStorage.setItem('transactions', JSON.stringify(transactions));
            localStorage.setItem('dailySales', JSON.stringify(dailySales));
        }

        function generateQuickButtons() {
            const fG = document.getElementById("foodGrid"); const dG = document.getElementById("drinkGrid");
            const sfG = document.getElementById("stockFoodGrid"); const sdG = document.getElementById("stockDrinkGrid");
            fG.innerHTML = ""; dG.innerHTML = ""; sfG.innerHTML = ""; sdG.innerHTML = "";

            Object.keys(inventory).forEach(code => {
                const item = inventory[code];
                const btn = document.createElement("button");
                btn.className = `product-btn ${item.category === 'food' ? 'food-btn' : 'drink-btn'}`;
                btn.textContent = item.name;
                btn.onclick = () => { playClick(); quickAddItem(code); };

                const stockBtn = document.createElement("button");
                stockBtn.className = `product-btn ${item.category === 'food' ? 'food-btn' : 'drink-btn'}`;
                stockBtn.textContent = item.name;
                stockBtn.onclick = () => { playClick(); openStockMultiplier(code); };

                if(item.category === "food") { fG.appendChild(btn); sfG.appendChild(stockBtn); }
                else { dG.appendChild(btn); sdG.appendChild(stockBtn); }
            });
        }

        function login() {
            const pin = document.getElementById("pin").value.trim();
            if(STAFF[pin]) {
                currentStaffName = STAFF[pin];
                document.getElementById("login").style.display = "none";
                document.getElementById("pos").style.display = "block";
                generateQuickButtons();
                if(transactions.length === 0 || transactions[transactions.length-1].status === "paid") createNewTransaction();
                else loadTransaction(transactions.length - 1);
            } else alert("Invalid PIN");
        }

        function stockInMode() {
            document.getElementById("login").style.display = "none";
            document.getElementById("stockIn").style.display = "block";
            generateQuickButtons();
        }

        function logout() { location.reload(); }

        function createNewTransaction() {
            const t = { id: transactions.length + 1, items: [], total: 0, status: "active", staff: currentStaffName };
            transactions.push(t);
            currentTransIndex = transactions.length - 1;
            cart = t.items;
            saveAll(); updateUI();
        }

        function loadTransaction(idx) {
            currentTransIndex = idx;
            cart = transactions[idx].items;
            updateUI();
        }

        function quickAddItem(code) {
            const item = inventory[code];
            if(item.stock <= 0) return alert("OUT OF STOCK");
            cart.push({ name: item.name, price: item.price, code: code });
            item.stock--; item.sold++;
            playEat(); saveAll(); updateCart();
        }

        function updateCart() {
            const list = document.getElementById("items"); list.innerHTML = "";
            let total = 0;
            cart.forEach((it, i) => {
                total += it.price;
                const li = document.createElement("li");
                li.innerHTML = `${it.name} <span>R${it.price.toFixed(2)} <button onclick="removeItem(${i})" style="background:red; color:white; font-size:1rem; padding:5px; width:auto;">X</button></span>`;
                list.appendChild(li);
            });
            document.getElementById("total").textContent = `Total: R${total.toFixed(2)}`;
            transactions[currentTransIndex].items = cart;
            transactions[currentTransIndex].total = total;
            saveAll();
        }

        function removeItem(i) {
            inventory[cart[i].code].stock++;
            inventory[cart[i].code].sold--;
            cart.splice(i, 1);
            saveAll(); updateCart();
        }

        function clearCart() {
            cart.forEach(it => { inventory[it.code].stock++; inventory[it.code].sold--; });
            cart = []; saveAll(); updateCart();
        }

        function openStockMultiplier(code) {
            pendingStockCode = code;
            document.getElementById("popupItemName").textContent = inventory[code].name;
            document.getElementById("multiplierPopup").style.display = "block";
        }

        function confirmMultiplier() {
            const p = parseInt(document.getElementById("packsInput").value) || 0;
            const c = parseInt(document.getElementById("casesInput").value) || 0;
            let qty = (p * 6) + (c * 24) || 1;
            inventory[pendingStockCode].stock += qty;
            playSparkle(); saveAll();
            document.getElementById("multiplierPopup").style.display = "none";
        }

        function cancelMultiplier() {
            inventory[pendingStockCode].stock += 1;
            saveAll(); document.getElementById("multiplierPopup").style.display = "none";
        }

        function payCash() {
            if(cart.length === 0) return;
            const total = cart.reduce((s,i) => s + i.price, 0);
            window.pendingTotal = total;
            document.getElementById("tenderTotal").textContent = total.toFixed(2);
            document.getElementById("tenderPopup").style.display = "block";
        }

        document.getElementById("tenderAmount").oninput = (e) => {
            const change = (parseFloat(e.target.value) || 0) - window.pendingTotal;
            document.getElementById("tenderResult").textContent = change >= 0 ? `Change: R${change.toFixed(2)}` : "";
        };

        function confirmTender() {
            dailySales.cash += window.pendingTotal;
            finalizeSale("CASH", window.pendingTotal);
            document.getElementById("tenderPopup").style.display = "none";
        }

        function payCard() {
            const total = cart.reduce((s,i) => s + i.price, 0);
            dailySales.card += total;
            finalizeSale("CARD", total);
        }

        function finalizeSale(m, t) {
            transactions[currentTransIndex].status = "paid";
            lastReceiptContent = `PAPA RON'S\nOrder #${transactions[currentTransIndex].id}\nTotal: R${t.toFixed(2)}\nMethod: ${m}`;
            document.getElementById("printReceiptBtn").style.display = "block";
            saveAll(); updateUI();
        }

        function printLastReceipt() {
            const w = window.open();
            w.document.write(`<pre>${lastReceiptContent}</pre>`);
            w.document.close();
            createNewTransaction();
            document.getElementById("printReceiptBtn").style.display = "none";
        }

        function printPreview() {
            let out = "KITCHEN:\n";
            cart.filter(i => inventory[i.code].category === "food").forEach(i => out += `- ${i.name}\n`);
            out += "\nBAR:\n";
            cart.filter(i => inventory[i.code].category === "drink").forEach(i => out += `- ${i.name}\n`);
            const w = window.open(); w.document.write(`<pre>${out}</pre>`);
        }

        function showInventory() {
            document.getElementById("pos").style.display = "none";
            document.getElementById("inventoryView").style.display = "block";
            const l = document.getElementById("inventoryList"); l.innerHTML = "";
            Object.keys(inventory).forEach(c => {
                const li = document.createElement("li");
                li.textContent = `${inventory[c].name}: ${inventory[c].stock}`;
                l.appendChild(li);
            });
        }

        function showTransactions() {
            document.getElementById("pos").style.display = "none";
            document.getElementById("transactionsView").style.display = "block";
            const l = document.getElementById("transList"); l.innerHTML = "";
            transactions.forEach((t, i) => {
                const b = document.createElement("button");
                b.textContent = `Order #${t.id} - R${t.total.toFixed(2)}`;
                b.onclick = () => { if(t.status === "active") { loadTransaction(i); backToPOS(); } };
                l.appendChild(b);
            });
        }

        function backToPOS() {
            document.getElementById("inventoryView").style.display = "none";
            document.getElementById("transactionsView").style.display = "none";
            document.getElementById("pos").style.display = "block";
        }

        function updateUI() {
            document.getElementById("currentTransNum").textContent = transactions[currentTransIndex].id;
            document.getElementById("transStatus").textContent = transactions[currentTransIndex].status === "active" ? "(OPEN)" : "(PAID)";
            updateCart();
        }

        document.getElementById("barcode").onkeyup = (e) => { if(e.key === "Enter") { quickAddItem(e.target.value.trim()); e.target.value = ""; } };
        document.getElementById("stockBarcode").onkeyup = (e) => { if(e.key === "Enter") { openStockMultiplier(e.target.value.trim()); e.target.value = ""; } };
    </script>
</body>
</html>
