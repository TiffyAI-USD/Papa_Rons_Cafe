<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAPA RON'S POS - PRODUCTION SYSTEM</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* Banner sizing to match product photo width exactly */
        .banner-container { width: 100%; display: flex; justify-content: center; margin-bottom: 20px; }
        #top-banner { width: 100%; max-width: 800px; height: auto; border-bottom: 2px solid #d4a373; }

        h1 { text-align: center; color: #d4a373; font-size: 2.2rem; margin: 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Navigation & Screens */
        #login-screen, #pos-screen, #stock-screen, #inventory-view, #history-view { display: none; }
        .active { display: block !important; }

        .nav-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .nav-btn { flex: 1; padding: 15px; font-size: 1.1rem; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .logout { background: #c62828; color: white; }
        .stock-view-btn { background: #455a64; color: white; }
        .history-btn { background: #455a64; color: white; }

        /* Grid Layout */
        .main-layout { display: flex; gap: 15px; height: 52vh; margin-bottom: 15px; }
        .grid-box { flex: 1; display: flex; flex-direction: column; }
        .grid-label { text-align: center; color: #d4a373; font-weight: bold; padding: 8px; background: #1a1a1a; border-radius: 8px 8px 0 0; border-bottom: 1px solid #333; }
        
        .button-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            overflow-y: auto; 
            background: #080808; 
            padding: 10px; 
            border: 1px solid #333; 
            border-radius: 0 0 15px 15px;
            flex-grow: 1;
        }

        /* Product Buttons */
        .item-btn { 
            min-height: 85px; 
            color: white; 
            border-radius: 12px; 
            border: none; 
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            padding: 10px;
            line-height: 1.2;
            box-shadow: 0 4px #000;
        }
        .food { background: #5d4037; border-bottom: 4px solid #3e2723; }
        .drink { background: #1565c0; border-bottom: 4px solid #0d47a1; }
        .item-btn:active { transform: translateY(3px); box-shadow: 0 1px #000; }

        /* Transaction / Cart Area */
        .cart-box { background: #111; border: 1px solid #222; border-radius: 15px; padding: 15px; }
        #display-total { font-size: 3.2rem; text-align: center; color: #44ff44; font-weight: bold; margin-bottom: 15px; font-family: monospace; }
        .checkout-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .pay-btn { height: 75px; font-size: 1.6rem; font-weight: bold; color: white; border-radius: 12px; border: none; cursor: pointer; }
        .cash { background: #43a047; }
        .card { background: #1e88e5; }
        
        #receipt-list { list-style: none; padding: 0; margin-top: 15px; max-height: 180px; overflow-y: auto; border-top: 1px solid #333; }
        .receipt-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; font-size: 1.1rem; }
        .del-item { background: #ff5252; color: white; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; }

        /* Modals */
        .modal-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 2000; }
        .modal-content { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #1a1a1a; padding: 30px; border: 2px solid #d4a373; 
            width: 85%; max-width: 450px; z-index: 2001; border-radius: 20px; display: none;
        }
        input { width: 100%; padding: 15px; font-size: 1.5rem; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 10px; box-sizing: border-box; text-align: center; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="banner-container">
        <img id="top-banner" src="https://tiffyai-usd.github.io/Papa_Ron_Point_of_Sale/banner.png" alt="PAPA RON'S">
    </div>

    <div id="login-screen" class="active">
        <h1>STAFF LOGIN</h1>
        <div style="max-width: 400px; margin: 0 auto; text-align: center;">
            <input type="password" id="pin-input" placeholder="ENTER PIN" autofocus />
            <button class="nav-btn" onclick="handleAuth('sale')" style="background:#d4a373; color:black; width:100%; margin-top:10px;">OPEN POS</button>
            <button class="nav-btn" onclick="handleAuth('stock')" style="background:#2e7d32; color:white; width:100%; margin-top:15px;">ADD STOCK</button>
        </div>
    </div>

    <div id="pos-screen">
        <div class="nav-bar">
            <button class="nav-btn logout" onclick="location.reload()">LOGOUT</button>
            <button class="nav-btn stock-view-btn" onclick="openInventory()">INVENTORY</button>
            <button class="nav-btn history-btn" onclick="openHistory()">HISTORY</button>
        </div>

        <div class="main-layout">
            <div class="grid-box">
                <div class="grid-label">KITCHEN MENU</div>
                <div id="saleFoodGrid" class="button-grid"></div>
            </div>
            <div class="grid-box">
                <div class="grid-label">BAR MENU</div>
                <div id="saleDrinkGrid" class="button-grid"></div>
            </div>
        </div>

        <div class="cart-box">
            <div id="display-total">R0.00</div>
            <div class="checkout-row">
                <button class="pay-btn cash" onclick="finalizeSale('CASH')">CASH</button>
                <button class="pay-btn card" onclick="finalizeSale('CARD')">CARD</button>
            </div>
            <input type="text" id="scanner-input" placeholder="SCAN BARCODE..." style="font-size: 1rem; padding: 10px; margin-top: 10px;">
            <ul id="receipt-list"></ul>
        </div>
    </div>

    <div id="stock-screen">
        <h1>REPLENISHMENT MODE</h1>
        <button class="nav-btn" onclick="location.reload()" style="background:#333; color:white; margin-bottom:15px;">BACK TO LOGIN</button>
        
        <div class="main-layout">
            <div class="grid-box">
                <div class="grid-label">TAP FOOD TO ADD</div>
                <div id="stockFoodGrid" class="button-grid"></div>
            </div>
            <div class="grid-box">
                <div class="grid-label">TAP DRINK TO ADD</div>
                <div id="stockDrinkGrid" class="button-grid"></div>
            </div>
        </div>
        <div id="stock-msg" style="text-align:center; font-size:1.5rem; color:#44ff44; font-weight:bold; margin-top:10px; height: 30px;"></div>
    </div>

    <div id="modal-overlay" class="modal-bg"></div>
    
    <div id="stock-modal" class="modal-content">
        <h2 id="modal-title" style="text-align:center; color:#d4a373;"></h2>
        <div style="display:flex; gap:10px;">
            <div style="flex:1;">
                <label>Packs (x6)</label>
                <input type="number" id="in-packs" value="0">
            </div>
            <div style="flex:1;">
                <label>Cases (x24)</label>
                <input type="number" id="in-cases" value="0">
            </div>
        </div>
        <label>Singles</label>
        <input type="number" id="in-singles" placeholder="0">
        <button onclick="confirmStockAdd()" style="background:#44ff44; color:black; width:100%; padding:20px; font-size:1.5rem; font-weight:bold; border-radius:12px; margin-top:10px;">SAVE STOCK</button>
        <button onclick="closeModals()" style="background:#333; color:white; width:100%; padding:10px; margin-top:10px; border-radius:8px;">CANCEL</button>
    </div>

    <div id="history-modal" class="modal-content" style="max-width: 600px; max-height: 80vh; overflow-y: auto;">
        <h2>TRANSACTION HISTORY</h2>
        <div id="history-content"></div>
        <button onclick="closeModals()" class="nav-btn" style="background:#d4a373; color:black;">CLOSE</button>
    </div>

    <div id="inv-modal" class="modal-content" style="max-width: 500px; max-height: 80vh; overflow-y: auto;">
        <h2>CURRENT STOCK LEVELS</h2>
        <div id="inv-content"></div>
        <button onclick="closeModals()" class="nav-btn" style="background:#d4a373; color:black;">CLOSE</button>
    </div>

    <audio id="sound-click" src="https://tiffyai-usd.github.io/Papa_Ron_Point_of_Sale/click.wav"></audio>
    <audio id="sound-cash" src="https://tiffyai-usd.github.io/Papa_Ron_Point_of_Sale/eat.wav"></audio>
    <audio id="sound-sparkle" src="https://tiffyai-usd.github.io/Papa_Ron_Point_of_Sale/sparcle.wav"></audio>

    <script>
        // FULL INVENTORY DATABASE
        const DB = JSON.parse(localStorage.getItem('papa_rons_inv')) || {
            "1001": { name: "SOMETHING MEATY PIZZA", price: 135, stock: 0, cat: "food" },
            "1002": { name: "HAWAIIAN PIZZA", price: 135, stock: 0, cat: "food" },
            "1003": { name: "FLAMING SPARE RIB PIZZA", price: 150, stock: 0, cat: "food" },
            "1004": { name: "CHEESE BURGER", price: 120, stock: 0, cat: "food" },
            "1005": { name: "CHEESY STRIPS (5)", price: 50, stock: 0, cat: "food" },
            "1006": { name: "BOERIE ROLL", price: 50, stock: 0, cat: "food" },
            "1007": { name: "RUMP STEAK", price: 160, stock: 0, cat: "food" },
            "1008": { name: "RIB RACK", price: 200, stock: 0, cat: "food" },
            "1009": { name: "SCHNITZEL", price: 120, stock: 0, cat: "food" },
            "1010": { name: "PREGO ROLL", price: 50, stock: 0, cat: "food" },
            "1011": { name: "MUNCHIE PLATTER", price: 350, stock: 0, cat: "food" },
            "1012": { name: "CHEESY POPS", price: 50, stock: 0, cat: "food" },
            "1013": { name: "CHICKEN PERI NACHO", price: 160, stock: 0, cat: "food" },
            "1014": { name: "WINGLETS 5", price: 60, stock: 0, cat: "food" },
            "1015": { name: "WINGLETS 10", price: 100, stock: 0, cat: "food" },
            "1016": { name: "PLATTER FOR 2", price: 350, stock: 0, cat: "food" },
            "1017": { name: "BREAKFAST", price: 80, stock: 0, cat: "food" },
            "1018": { name: "SIDE CHIPS", price: 20, stock: 0, cat: "food" },
            "1019": { name: "SIDE SALAD", price: 20, stock: 0, cat: "food" },
            "1020": { name: "GREEK SALAD", price: 20, stock: 0, cat: "food" },
            "5449000000453": { name: "COKE 500ML", price: 20, stock: 0, cat: "drink" },
            "5449000050809": { name: "FANTA 500ML", price: 20, stock: 0, cat: "drink" },
            "5449000332967": { name: "SPRITE 500ML", price: 20, stock: 0, cat: "drink" },
            "2004": { name: "POWERADE 500ML", price: 15, stock: 0, cat: "drink" },
            "6001240239490": { name: "LIQUIFRUIT 300ML", price: 15, stock: 0, cat: "drink" },
            "6001048003323": { name: "APPLETIZER 275ML", price: 20, stock: 0, cat: "drink" },
            "2007": { name: "MR ORANGE 300ML", price: 10, stock: 0, cat: "drink" },
            "5449000332981": { name: "STONEY 500ML", price: 20, stock: 0, cat: "drink" },
            "5449000096111": { name: "TONIC WATER 200ML", price: 20, stock: 0, cat: "drink" },
            "5449000284280": { name: "DRY LEMON 200ML", price: 20, stock: 0, cat: "drink" },
            "2011": { name: "MINERAL WATER 500ML", price: 10, stock: 0, cat: "drink" },
            "6001324217253": { name: "ENERGADE 500ML", price: 20, stock: 0, cat: "drink" },
            "2012": { name: "SPARKLING WATER 500ML", price: 15, stock: 0, cat: "drink" },
            "6009604170014": { name: "STILL WATER 500ML", price: 10, stock: 0, cat: "drink" },
            "2013": { name: "MINERAL WATER 1L", price: 15, stock: 0, cat: "drink" },
            "6003326012041": { name: "BLACK LABEL 500ML", price: 30, stock: 0, cat: "drink" },
            "6003326015790": { name: "BLACK LABEL 330ML", price: 30, stock: 0, cat: "drink" },
            "6003326015820": { name: "CASTLE LAGER 330ML", price: 30, stock: 0, cat: "drink" },
            "6003326015721": { name: "CASTLE LIGHT 330ML", price: 30, stock: 0, cat: "drink" },
            "6001760007715": { name: "WINDHOEK 500ML", price: 30, stock: 0, cat: "drink" },
            "6001108064264": { name: "HUNTERS DRY 440ML", price: 35, stock: 0, cat: "drink" },
            "6001108055231": { name: "HUNTERS GOLD 330ML", price: 35, stock: 0, cat: "drink" },
            "6001398128400": { name: "SMIRNOFF ICE 440ML", price: 35, stock: 0, cat: "drink" },
            "6003326013949": { name: "BRUTAL FRUIT 275ML", price: 35, stock: 0, cat: "drink" },
            "5010677554398": { name: "BREEZER WATERMELON", price: 35, stock: 0, cat: "drink" },
            "6003326013918": { name: "FLYING FISH 500ML", price: 35, stock: 0, cat: "drink" },
            "6001108028044": { name: "SAVANNA 330ML", price: 35, stock: 0, cat: "drink" },
            "5410228141266": { name: "STELLA ARTOIS 330ML", price: 35, stock: 0, cat: "drink" },
            "6003326015691": { name: "BLACK CROWN 440ML", price: 35, stock: 0, cat: "drink" },
            "5000289938297": { name: "GORDONS PINK 440ML", price: 35, stock: 0, cat: "drink" },
            "5000289938280": { name: "GORDONS GIN 440ML", price: 35, stock: 0, cat: "drink" },
            "6001108097217": { name: "EXTREME 275ML", price: 35, stock: 0, cat: "drink" },
            "2211": { name: "SODAZE 250ML", price: 60, stock: 0, cat: "drink" },
            "6001108112064": { name: "BERNINI 500ML", price: 35, stock: 0, cat: "drink" },
            "9002490100070": { name: "RED BULL 250ML", price: 25, stock: 0, cat: "drink" },
            "2210": { name: "LUCKY CLUB 250ML", price: 70, stock: 0, cat: "drink" }
        };

        let activeCart = [];
        let history = JSON.parse(localStorage.getItem('papa_rons_history')) || [];
        let pendingItemCode = "";

        // 1. AUTHENTICATION & INITIALIZATION
        function handleAuth(mode) {
            const pin = document.getElementById('pin-input').value;
            if(pin === "1234") {
                document.getElementById('login-screen').classList.remove('active');
                if(mode === 'sale') {
                    document.getElementById('pos-screen').classList.add('active');
                    renderGrids('sale');
                } else {
                    document.getElementById('stock-screen').classList.add('active');
                    renderGrids('stock');
                }
            } else { alert("ACCESS DENIED"); }
        }

        // 2. GRID RENDERING (SALE AND STOCK MODES)
        function renderGrids(view) {
            const fGridId = view === 'sale' ? 'saleFoodGrid' : 'stockFoodGrid';
            const dGridId = view === 'sale' ? 'saleDrinkGrid' : 'stockDrinkGrid';
            const fContainer = document.getElementById(fGridId);
            const dContainer = document.getElementById(dGridId);
            
            fContainer.innerHTML = "";
            dContainer.innerHTML = "";

            Object.keys(DB).forEach(barcode => {
                const product = DB[barcode];
                const btn = document.createElement('button');
                btn.className = `item-btn ${product.cat}`;
                btn.textContent = product.name;

                if(view === 'sale') {
                    btn.onclick = () => { play('sound-click'); addToCart(barcode); };
                } else {
                    btn.onclick = () => { play('sound-click'); openStockMultiplier(barcode); };
                }

                if(product.cat === 'food') fContainer.appendChild(btn);
                else dContainer.appendChild(btn);
            });
        }

        // 3. CART / SALE LOGIC
        function addToCart(code) {
            const item = DB[code];
            if(item.cat === 'drink' && item.stock <= 0) {
                alert("OUT OF STOCK!");
                return;
            }
            activeCart.push({...item, code: code});
            if(item.cat === 'drink') item.stock--;
            play('sound-cash');
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('receipt-list');
            list.innerHTML = "";
            let total = 0;
            activeCart.forEach((it, idx) => {
                total += it.price;
                list.innerHTML += `<li class="receipt-item">${it.name} <span>R${it.price.toFixed(2)} <button class="del-item" onclick="voidItem(${idx})">X</button></span></li>`;
            });
            document.getElementById('display-total').textContent = "R" + total.toFixed(2);
            localStorage.setItem('papa_rons_inv', JSON.stringify(DB));
        }

        function voidItem(idx) {
            const item = activeCart[idx];
            if(DB[item.code].cat === 'drink') DB[item.code].stock++;
            activeCart.splice(idx, 1);
            updateCartUI();
        }

        function finalizeSale(method) {
            if(activeCart.length === 0) return;
            const total = activeCart.reduce((sum, i) => sum + i.price, 0);
            history.push({
                date: new Date().toLocaleString(),
                total: total,
                method: method,
                items: activeCart.map(i => i.name)
            });
            localStorage.setItem('papa_rons_history', JSON.stringify(history));
            alert("SALE COMPLETE. R" + total.toFixed(2) + " via " + method);
            activeCart = [];
            updateCartUI();
        }

        // 4. STOCK REPLENISHMENT
        function openStockMultiplier(code) {
            pendingItemCode = code;
            document.getElementById('modal-title').textContent = DB[code].name;
            document.getElementById('in-packs').value = 0;
            document.getElementById('in-cases').value = 0;
            document.getElementById('in-singles').value = "";
            
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('stock-modal').style.display = 'block';
        }

        function confirmStockAdd() {
            const p = parseInt(document.getElementById('in-packs').value) || 0;
            const c = parseInt(document.getElementById('in-cases').value) || 0;
            const s = parseInt(document.getElementById('in-singles').value) || 0;
            let totalAdded = (p * 6) + (c * 24) + s;
            if(totalAdded === 0) totalAdded = 1;

            DB[pendingItemCode].stock += totalAdded;
            localStorage.setItem('papa_rons_inv', JSON.stringify(DB));
            play('sound-sparkle');
            
            document.getElementById('stock-msg').textContent = "ADDED " + totalAdded + " TO " + DB[pendingItemCode].name;
            closeModals();
            setTimeout(() => { document.getElementById('stock-msg').textContent = ""; }, 3000);
        }

        // 5. MODAL MANAGEMENT
        function openInventory() {
            const target = document.getElementById('inv-content');
            target.innerHTML = "";
            Object.keys(DB).forEach(c => {
                const item = DB[c];
                target.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333;">
                    <strong>${item.name}</strong><br>
                    Stock: <span style="color:${item.stock < 5 ? 'red' : '#44ff44'}">${item.stock}</span>
                </div>`;
            });
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('inv-modal').style.display = 'block';
        }

        function openHistory() {
            const target = document.getElementById('history-content');
            target.innerHTML = "";
            history.slice().reverse().forEach(h => {
                target.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333; font-size: 0.9rem;">
                    <b>${h.date}</b> | R${h.total.toFixed(2)} (${h.method})<br>
                    <small>${h.items.join(', ')}</small>
                </div>`;
            });
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('history-modal').style.display = 'block';
        }

        function closeModals() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.querySelectorAll('.modal-content').forEach(m => m.style.display = 'none');
        }

        function play(id) { document.getElementById(id).play().catch(()=>{}); }

        // Barcode Listener
        document.getElementById('scanner-input').addEventListener('keyup', (e) => {
            if(e.key === "Enter") {
                const val = e.target.value.trim();
                if(DB[val]) addToCart(val);
                else alert("NOT FOUND");
                e.target.value = "";
            }
        });
    </script>
</body>
</html>
